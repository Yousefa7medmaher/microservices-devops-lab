version: "3.9"

services: 
  # Auth Service 
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "5000:5000"
    env_file:
      - ./auth-service/.env
    depends_on:
      - mongo-auth
    networks:
      - microservices-net

  mongo-auth:
    image: mongo:6
    container_name: mongo-auth
    volumes:
      - mongo-auth-data:/data/db
    networks:
      - microservices-net 

  # Products Service 
  products-service:
    build: ./products-service
    container_name: products-service
    ports:
      - "3000:3000"
    env_file:
      - ./products-service/.env
    depends_on:
      - mongo-products
      - redis-products 
    networks:
      - microservices-net

  redis-products:
    image: redis:7
    container_name: redis-products
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-products-data:/data
    networks:
      - microservices-net

  mongo-products:
    image: mongo:6
    container_name: mongo-products
    volumes:
      - mongo-products-data:/data/db
    networks:
      - microservices-net

  cart-service:
    build: ./cart-service
    container_name: cart-service
    ports:
      - "3003:3003"
    env_file:
      - ./cart-service/.env
    depends_on:
      - mongo-cart
    networks:
      - microservices-net

  mongo-cart:
    image: mongo:6
    container_name: mongo-cart
    volumes:
      - mongo-cart-data:/data/db
    networks:
      - microservices-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3004:3004"
    env_file:
      - ./order-service/.env
    depends_on:
      - mongo-order
    networks:
      - microservices-net

  mongo-order:
    image: mongo:6
    container_name: mongo-order
    volumes:
      - mongo-order-data:/data/db
    networks:
      - microservices-net 

# Volumes
volumes:
  mongo-auth-data:
  mongo-products-data:
  mongo-cart-data:
  mongo-order-data:
  redis-products-data:

# Network
networks:
  microservices-net:
    driver: bridge
